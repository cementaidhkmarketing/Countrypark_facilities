    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>

            padding: 0;

        }

            font-family: 'Segoe UI', 'PingFang HK', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);

            padding: 30px 20px;

        }

            content: "";

        /* 標題區 */

        select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;

            border-radius: 28px;

        }

            background: #e0e0e0;
            border-radius: 20px;
            height: 28px;
            overflow: hidden;

        }

        .pressure-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;

        }

        .pressure-status {
            font-weight: 700;
            margin-top: 12px;
            font-size: 1rem;

        /* 數據表格 */
        .stats-card {
            background: white;

            font-weight: 700;

        .stats-table {
            width: 100%;
            border-collapse: collapse;

        .stats-table tr {

        }

        .stats-table td {
            padding: 12px 8px;
        }

        .stats-table td:first-child {
            font-weight: 600;
            color: #2c3e2f;
        }

        .stats-table td:last-child {

            border-radius: 20px;

        }

            font-size: 0.7rem;
            color: #5d6d5a;
            margin-top: 24px;
        }

            .lang-switch { padding: 6px 18px; font-size: 0.85rem; top: -5px; }
            .container { max-width: 100%; }
        }
    </style>
</head>
<body>

<script>
    // ---------- 多語言詞庫 (完整中英對照) ----------
    const langData = {

        },
        en: {
            switchBtn: "🇭🇰 中文",

            pressureLabel: "📈 Facility Pressure Index",
            statsTitle: "🔧 Facility Configuration",
            footer: "📍 Source: AFCD Open Data<br>Campsite capacity/water from Campsites.csv | Toilets/Water Dispensers within 1.5km radius | Popularity index based on 2025 AFCD report",
            tentSpace: "🏕️ Tent Spaces",
            waterSource: "🚰 Water Source",
            nearbyToilets: "🚻 Nearby Toilets (1.5km)",
            nearbyWater: "🚰 Nearby Water Dispensers",
            popularity: "📊 Popularity Index",
            parkBelong: "🏞️ Country Park",
            suggestionPrefix: "💡 ",
            pressureHigh: "🔴 High Pressure · Severely Underserved",
            pressureMid: "🟡 Medium Pressure · Arrive early on holidays",
            pressureLow: "🟢 Low Pressure · Adequate facilities",
            suggestionHigh: "⚠️ This campsite faces extremely high facility pressure! On holidays toilets & water dispensers are insufficient. Bring enough water (2L/person), arrive before 10 AM, and expect toilet queues.",
            suggestionMid: "🟡 Medium pressure. Queues possible on holidays. Bring drinking water, arrive early. Weekdays are better.",
            suggestionLow: "✅ Low pressure, relatively adequate facilities. Still plan ahead on holidays.",
            seasonalWaterNote: "<br><br>💧 Note: Seasonal stream water source. May dry up. Bring enough drinking water.",
            unitPcs: "",
            waterTap: "Tap water",
            waterStream: "Seasonal stream",
            waterOther: "Other",
            defaultParkName: "All Country Parks",
            loadingText: "Loading campsites..."
        }
    };

    let currentLang = "zh";
    // 資料儲存
    let allCampsites = [];
    let campsiteDatabase = {};
    let parksSet = new Set();
    let parkChineseMap = new Map();
    let allToilets = [];
    let allWaterDispensers = [];

    // ---- 工具函數 ----
    function calculateDistance(lat1, lng1, lat2, lng2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function calculateNearbyFacilities(camp, toilets, dispensers, radius = 1.5) {
        let nearbyToilets = 0, nearbyWater = 0;
        toilets.forEach(t => { if (calculateDistance(camp.lat, camp.lng, t.lat, t.lng) <= radius) nearbyToilets++; });
        dispensers.forEach(d => { if (calculateDistance(camp.lat, camp.lng, d.lat, d.lng) <= radius) nearbyWater++; });
        return { nearbyToilets, nearbyWater };
    }

    function calculatePressure(camp) {
        let facilityScore = (camp.nearbyToilets * 2) + (camp.nearbyWaterDispenser * 1.5);
        if (camp.tentValue >= 50) facilityScore += 3;
        else if (camp.tentValue >= 30) facilityScore += 2;
        else facilityScore += 1;
        let pressure = (camp.popularityIndex / Math.max(1, facilityScore)) * 1.2;
        return Math.min(100, Math.round(pressure));
    }

    function getPressureLevel(pressure) {
        if (pressure >= 70) return "high";
        if (pressure >= 45) return "mid";
        return "low";
    }

    function getPressureText(level) {
        const t = langData[currentLang];
        if (level === "high") return t.pressureHigh;
        if (level === "mid") return t.pressureMid;
        return t.pressureLow;
    }

    function getDisplayParkName(parkEng) {
        if (currentLang === "zh") {
            return parkChineseMap.get(parkEng) || parkEng;
        }
        return parkEng;
    }

    function updateUIForCamp(campId) {
        const camp = campsiteDatabase[campId];
        if (!camp) return;
        const pressure = calculatePressure(camp);
        const level = getPressureLevel(pressure);
        const pressureText = getPressureText(level);
        const colorMap = { high: "#f44336", mid: "#ff9800", low: "#4caf50" };
        document.getElementById("pressureValue").innerHTML = `${pressure}<span style="font-size:1rem;">/100</span>`;
        document.getElementById("pressureFill").style.width = `${pressure}%`;
        document.getElementById("pressureFill").style.backgroundColor = colorMap[level];
        document.getElementById("pressureStatus").innerHTML = pressureText;

        const t = langData[currentLang];
        let tentDisplay = camp.tentSpace;
        if (currentLang === "zh") {
            if (camp.tentSpace === "More than 50") tentDisplay = "50+ 個";
            else if (camp.tentSpace === "20-50") tentDisplay = "20-50 個";
            else if (camp.tentSpace === "Less than 20") tentDisplay = "少於 20 個";
        }
        let waterTypeDisplay = camp.waterType;
        if (currentLang === "en") {
            if (camp.waterType === "水喉") waterTypeDisplay = t.waterTap;
            else if (camp.waterType === "溪澗(季節性)") waterTypeDisplay = t.waterStream;
            else waterTypeDisplay = t.waterOther;
        }
        const parkDisplay = currentLang === "zh" ? (parkChineseMap.get(camp.park) || camp.park) : camp.park;

        const tableHtml = `
            <tr><td>${t.tentSpace}</td><td>${tentDisplay}</td></tr>
            <tr><td>${t.waterSource}</td><td>${waterTypeDisplay}</td></tr>
            <tr><td>${t.nearbyToilets}</td><td>${camp.nearbyToilets} ${t.unitPcs}</td></tr>
            <tr><td>${t.nearbyWater}</td><td>${camp.nearbyWaterDispenser} ${t.unitPcs}ERC20</td></tr>
            <tr><td>${t.popularity}</td><td>${camp.popularityIndex}/100ERC20</td></tr>
            <tr><td>${t.parkBelong}ERC20<td>${parkDisplay}ERC20</tr>
        `;
        document.getElementById("facilityTable").innerHTML = tableHtml;

        let suggestion = "";
        if (pressure >= 70) suggestion = t.suggestionHigh;
        else if (pressure >= 45) suggestion = t.suggestionMid;
        else suggestion = t.suggestionLow;
        if (camp.waterType === "溪澗(季節性)" || (camp.waterSource && camp.waterSource.includes("STREAM"))) {
            suggestion += t.seasonalWaterNote;
        }
        document.getElementById("suggestionBox").innerHTML = `${t.suggestionPrefix}${suggestion}`;
    }

    function updateCampsiteDropdown(selectedParkKey = "all") {
        const campsiteSelect = document.getElementById("campsiteSelect");
        let filteredCamps = [];
        if (selectedParkKey === "all") {
            filteredCamps = Object.values(campsiteDatabase);
        } else {
            filteredCamps = Object.values(campsiteDatabase).filter(c => c.park === selectedParkKey);
        }
        if (filteredCamps.length === 0) {
            campsiteSelect.innerHTML = `<option disabled>${langData[currentLang].loadingText}</option>`;
            return;
        }
        campsiteSelect.innerHTML = "";
        filteredCamps.forEach(camp => {
            const option = document.createElement("option");
            option.value = camp.id;
            option.textContent = camp.name;
            campsiteSelect.appendChild(option);
        });
        if (filteredCamps.length > 0) {
            campsiteSelect.value = filteredCamps[0].id;
            updateUIForCamp(filteredCamps[0].id);
        }
    }

    function bindParkSelectEvent() {
        const parkSelect = document.getElementById("parkSelect");
        parkSelect.addEventListener("change", (e) => {
            updateCampsiteDropdown(e.target.value);
        });
    }

    function bindCampSelectEvent() {
        const campSelect = document.getElementById("campsiteSelect");
        campSelect.addEventListener("change", (e) => {
            if (e.target.value) updateUIForCamp(e.target.value);
        });
    }

    async function loadCampsitesCSV() {
        try {
            const resp = await fetch('Campsites.csv.csv');
            if (!resp.ok) throw new Error("Campsites.csv.csv not found");
            const text = await resp.text();
            const result = Papa.parse(text, { header: true, skipEmptyLines: true });
            const camps = [];
            for (const row of result.data) {
                let lat = 0, lng = 0;
                for (const k of Object.keys(row)) {
                    if ((k.includes('Latitude') && k.includes('Decimal')) || k === 'Latitude') lat = parseFloat(row[k]) || 0;
                    if ((k.includes('Longitude') && k.includes('Decimal')) || k === 'Longitude') lng = parseFloat(row[k]) || 0;
                }
                let name = row['Name of Building/Facility'] || row['建築物/設施名稱'] || '';
                let park = row['Country Park'] || row['郊野公園'] || '';
                if (lat && lng && !isNaN(lat) && !isNaN(lng) && lat !== 0 && name) {
                    let tentSpace = row['Tent space'] || row['營位數目'] || '';
                    let tentValue = 60;
                    if (tentSpace.includes('Less than 20') || tentSpace.includes('少於 20')) tentValue = 15;
                    else if (tentSpace.includes('20-50')) tentValue = 35;
                    else if (tentSpace.includes('More than 50') || tentSpace.includes('超過 50')) tentValue = 60;
                    let waterRaw = row['Source of water'] || row['水源'] || '';
                    let waterType = waterRaw.includes('TAP') ? '水喉' : (waterRaw.includes('STREAM') ? '溪澗(季節性)' : '其他');
                    camps.push({
                        id: `${name}_${lat}_${lng}`,
                        name: name,
                        park: park,
                        lat, lng,
                        tentSpace, tentValue,
                        waterSource: waterRaw,
                        waterType,
                        popularityIndex: 70
                    });
                    if (park) parksSet.add(park);
                }
            }
            return camps;
        } catch(e) { console.error(e); return []; }
    }

    async function loadToiletsCSV() {
        try {
            const resp = await fetch('Toilets.csv.csv');
            if (!resp.ok) return [];
            const text = await resp.text();
            const result = Papa.parse(text, { header: true, skipEmptyLines: true });
            const toilets = [];
            for (const row of result.data) {
                let lat = parseFloat(row['Latitude Decimal Degree(DD.DDD)'] || row['Latitude'] || 0);
                let lng = parseFloat(row['Longitude Decimal Degree(DD.DDD)'] || row['Longitude'] || 0);
                if (lat && lng && !isNaN(lat) && !isNaN(lng) && lat !== 0) {
                    toilets.push({ lat, lng, name: row['Name of Building/Facility'] || '' });
                }
            }
            return toilets;
        } catch(e) { return []; }
    }

    async function loadWaterDispensersCSV() {
        try {
            const resp = await fetch('Water_Dispenser_CP.csv.csv');
            if (!resp.ok) return [];
            const text = await resp.text();
            const result = Papa.parse(text, { header: true, skipEmptyLines: true });
            const dispensers = [];
            for (const row of result.data) {
                let lat = parseFloat(row['Latitude'] || row['Latitude Decimal Degree(DD.DDD)'] || 0);
                let lng = parseFloat(row['Longitude'] || row['Longitude Decimal Degree(DD.DDD)'] || 0);
                if (lat && lng && !isNaN(lat) && !isNaN(lng) && lat !== 0) {
                    dispensers.push({ lat, lng });
                }
            }
            return dispensers;
        } catch(e) { return []; }
    }

    function buildParkChineseMap() {
        const mapping = {
            "SAI KUNG EAST COUNTRY PARK": "西貢東郊野公園",
            "SAI KUNG WEST COUNTRY PARK": "西貢西郊野公園",

            "LANTAU SOUTH COUNTRY PARK": "南大嶼郊野公園",
            "LANTAU NORTH COUNTRY PARK": "北大嶼郊野公園",
            "CLEAR WATER BAY COUNTRY PARK": "清水灣郊野公園",
            "ABERDEEN COUNTRY PARK": "香港仔郊野公園",
            "POK FU LAM COUNTRY PARK": "薄扶林郊野公園",
            "LUNG FU SHAN COUNTRY PARK": "龍虎山郊野公園",
            "TAI TAM COUNTRY PARK": "大潭郊野公園",
            "SHEK O COUNTRY PARK": "石澳郊野公園",
            "TUNG LUNG FORT SPECIAL AREA": "東龍洲特別地區",
            "TSIU HANG SPECIAL AREA": "蕉坑特別地區",
            "TAI PO KAU NATURE RESERVE": "大埔滘自然護理區"
        };
        for (let [eng, chi] of Object.entries(mapping)) {
            parkChineseMap.set(eng, chi);
        }
    }

    async function init() {
        buildParkChineseMap();
        const campsRaw = await loadCampsitesCSV();
        allToilets = await loadToiletsCSV();
        allWaterDispensers = await loadWaterDispensersCSV();

        for (let camp of campsRaw) {
            const nearby = calculateNearbyFacilities(camp, allToilets, allWaterDispensers);
            camp.nearbyToilets = nearby.nearbyToilets;
            camp.nearbyWaterDispenser = nearby.nearbyWater;
            if (camp.name.includes("西灣") || camp.name.includes("鹹田")) camp.popularityIndex = 92;
            else if (camp.name.includes("鶴藪")) camp.popularityIndex = 78;
            else if (camp.name.includes("昂平")) camp.popularityIndex = 72;
            else if (camp.name.includes("灣仔")) camp.popularityIndex = 85;
            else if (camp.name.includes("大網仔")) camp.popularityIndex = 65;
            else if (camp.name.includes("涌背")) camp.popularityIndex = 60;
            else if (camp.name.includes("南山")) camp.popularityIndex = 70;
            else if (camp.name.includes("荃錦")) camp.popularityIndex = 68;
            else camp.popularityIndex = 55;
            campsiteDatabase[camp.id] = camp;
        }
        allCampsites = Object.values(campsiteDatabase);
        
        const parkSelect = document.getElementById("parkSelect");
        parkSelect.innerHTML = `<option value="all">${langData[currentLang].defaultParkName}</option>`;
        const sortedParks = Array.from(parksSet).sort();
        for (let p of sortedParks) {
            const option = document.createElement("option");
            option.value = p;
            option.textContent = getDisplayParkName(p);
            parkSelect.appendChild(option);
        }
        updateCampsiteDropdown("all");
        bindParkSelectEvent();
        bindCampSelectEvent();
        updateStaticText();
    }

    function updateStaticText() {
        const t = langData[currentLang];
        document.getElementById("langSwitchBtn").innerHTML = t.switchBtn;
        document.getElementById("headerTitle").innerHTML = t.headerTitle;
        document.getElementById("headerSub").innerHTML = t.headerSub;
        document.getElementById("headerBadge").innerHTML = t.headerBadge;
        document.getElementById("parkFilterIcon").innerHTML = t.parkFilterIcon;
        document.getElementById("parkFilterLabel").innerHTML = t.parkFilterLabel;
        document.getElementById("campIcon").innerHTML = t.campIcon;
        document.getElementById("campLabel").innerHTML = t.campLabel;
        document.getElementById("pressureLabel").innerHTML = t.pressureLabel;
        document.getElementById("statsTitle").innerHTML = t.statsTitle;
        document.getElementById("footerText").innerHTML = t.footer;
        
        const parkSelect = document.getElementById("parkSelect");
        const currentParkVal = parkSelect.value;
        parkSelect.innerHTML = `<option value="all">${t.defaultParkName}</option>`;
        const sortedParks = Array.from(parksSet).sort();
        for (let p of sortedParks) {
            const option = document.createElement("option");
            option.value = p;
            option.textContent = getDisplayParkName(p);
            parkSelect.appendChild(option);
        }
        parkSelect.value = currentParkVal;
        const campSelect = document.getElementById("campsiteSelect");
        if (campSelect && campSelect.value) {
            updateUIForCamp(campSelect.value);
        } else {
            updateCampsiteDropdown(currentParkVal);
        }
    }

    function switchLanguage() {
        currentLang = currentLang === "zh" ? "en" : "zh";
        updateStaticText();
    }

    document.getElementById("langSwitchBtn").addEventListener("click", switchLanguage);
    init();
</script>
</body>
</html>
